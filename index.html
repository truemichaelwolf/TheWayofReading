<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Way of Reading</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#0c0f14;--surface:#151922;--text:#e8e6e1;--text-dim:#7a8194;
            --accent:#d4a054;--accent-glow:rgba(212,160,84,0.12);--accent2:#5b8a72;
            --border:rgba(255,255,255,0.06);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

        .ambient{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
        .orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.3;animation:drift 20s ease-in-out infinite alternate}
        .orb:nth-child(1){width:500px;height:500px;background:radial-gradient(circle,var(--accent),transparent 70%);top:-10%;right:-5%;animation-duration:25s}
        .orb:nth-child(2){width:400px;height:400px;background:radial-gradient(circle,var(--accent2),transparent 70%);bottom:-10%;left:-8%;animation-duration:30s;animation-delay:-5s}
        .orb:nth-child(3){width:300px;height:300px;background:radial-gradient(circle,#6366f1,transparent 70%);top:50%;left:40%;opacity:.12;animation-duration:22s;animation-delay:-10s}
        @keyframes drift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-30px) scale(1.1)}100%{transform:translate(-20px,20px) scale(.95)}}

        .wrapper{position:relative;z-index:2;max-width:960px;margin:0 auto;padding:4rem 2rem 3rem}

        header{margin-bottom:3.5rem;animation:fadeUp .8s ease-out}
        .tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);background:var(--accent-glow);border:1px solid rgba(212,160,84,.2);padding:.3rem .8rem;border-radius:20px;margin-bottom:1.2rem}
        h1{font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(2.5rem,5vw,3.8rem);line-height:1.1;letter-spacing:-.02em;margin-bottom:.8rem;background:linear-gradient(135deg,var(--text),var(--text-dim));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        h1 em{font-style:italic;background:linear-gradient(135deg,#d4a054,#c47832);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .subtitle{font-size:1.05rem;font-weight:300;color:var(--text-dim);max-width:500px;line-height:1.6}

        .search-wrap{position:relative;margin-bottom:2rem;animation:fadeUp .8s ease-out .15s both}
        .search-wrap input{width:100%;padding:1rem 1.2rem 1rem 3rem;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;font-size:.95rem;font-weight:400;outline:none;transition:border-color .3s,box-shadow .3s}
        .search-wrap input::placeholder{color:var(--text-dim);font-weight:300}
        .search-wrap input:focus{border-color:rgba(212,160,84,.4);box-shadow:0 0 0 4px var(--accent-glow)}
        .search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-dim);transition:color .3s}
        .search-wrap input:focus~.search-icon{color:var(--accent)}

        .stats{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;animation:fadeUp .8s ease-out .25s both}
        .stats .count{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--text-dim)}
        .stats .count strong{color:var(--accent);font-weight:400}
        .view-toggle{display:flex;gap:2px;background:var(--surface);border-radius:8px;padding:3px;border:1px solid var(--border)}
        .view-toggle button{background:none;border:none;color:var(--text-dim);padding:6px 10px;border-radius:6px;cursor:pointer;transition:all .2s;display:flex;align-items:center}
        .view-toggle button.active{background:rgba(212,160,84,.15);color:var(--accent)}

        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;animation:fadeUp .8s ease-out .35s both}
        .grid.list-view{grid-template-columns:1fr}

        .card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.4rem;text-decoration:none;color:var(--text);transition:all .3s cubic-bezier(.25,.46,.45,.94);overflow:hidden;display:flex;flex-direction:column;gap:.8rem}
        .card::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,var(--accent-glow),transparent 60%);opacity:0;transition:opacity .3s}
        .card:hover{border-color:rgba(212,160,84,.25);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.3),0 0 0 1px rgba(212,160,84,.1)}
        .card:hover::before{opacity:1}
        .grid.list-view .card{flex-direction:row;align-items:center;padding:1rem 1.4rem;gap:1rem}

        .card-number{position:relative;z-index:1;font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--accent);opacity:.5;line-height:1}
        .grid.list-view .card-number{font-size:1.3rem;min-width:48px;text-align:center}
        .card-body{position:relative;z-index:1;flex:1}
        .card-title{font-weight:500;font-size:.9rem;line-height:1.4;margin-bottom:.3rem}
        .card-meta{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text-dim);display:flex;align-items:center;gap:.4rem}
        .card-meta .dot{width:4px;height:4px;background:var(--accent);border-radius:50%;opacity:.5}
        .card-arrow{position:relative;z-index:1;color:var(--text-dim);opacity:0;transform:translateX(-4px);transition:all .3s;flex-shrink:0}
        .card:hover .card-arrow{opacity:1;transform:translateX(0);color:var(--accent)}

        .empty{text-align:center;padding:4rem 1rem;color:var(--text-dim);grid-column:1/-1}
        .empty .emoji{font-size:2.5rem;margin-bottom:1rem;opacity:.5}

        footer{margin-top:4rem;padding-top:2rem;border-top:1px solid var(--border);text-align:center;color:var(--text-dim);font-size:.78rem;font-weight:300;animation:fadeUp .8s ease-out .45s both}
        footer a{color:var(--accent);text-decoration:none}

        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @media(max-width:600px){.wrapper{padding:2.5rem 1.2rem 2rem}.grid{grid-template-columns:1fr}.card-number{font-size:1.5rem}}
    </style>
</head>
<body>
    <div class="ambient"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
    <div class="wrapper">
        <header>
            <div class="tag">Academic Dashboards</div>
            <h1>The Way of <em>Reading</em></h1>
            <p class="subtitle">Research paper dashboards &mdash; interactive explorations of academic literature</p>
        </header>
        <div class="search-wrap">
            <input type="text" id="search" placeholder="Search dashboards..." autocomplete="off">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </div>
        <div class="stats">
            <div class="count" id="count"></div>
            <div class="view-toggle">
                <button id="gridBtn" class="active" title="Grid view"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></button>
                <button id="listBtn" title="List view"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="12" r="1" fill="currentColor"/><circle cx="4" cy="18" r="1" fill="currentColor"/></svg></button>
            </div>
        </div>
        <div class="grid" id="fileGrid"></div>
        <footer>Built with care &middot; <a href="https://github.com/truemichaelwolf/TheWayofReading">GitHub Repo</a></footer>
    </div>
<script>
// ============ FILE LIST - edit here ============
var files = [
    "192-methodology.html",
    "192-overall.html",
    "193.html",
    "194.html",
    "195-us-english-lexis-dashboard.html",
    "196-love-fraud.html",
    "197-corpus-linguistics-dashboard.html",
    "198-dynamic-model-dashboard.html",
    "200.html",
    "201.html",
    "202.html",
    "203-methods.html",
    "203-overall.html"
];
// ===============================================

function parseFile(fn) {
    var name = fn.replace('.html', '');
    var m = name.match(/^(\d+)/);
    var num = m ? m[1] : '-';
    var label = name.replace(/^\d+-?/, '').replace(/-/g, ' ').trim();
    if (!label) label = 'Dashboard ' + num;
    label = label.charAt(0).toUpperCase() + label.slice(1);
    return { filename: fn, num: num, label: label };
}

var gridEl = document.getElementById('fileGrid');
var countEl = document.getElementById('count');
var searchEl = document.getElementById('search');

function render(filter) {
    var kw = (filter || '').toLowerCase();
    var matched = files.map(parseFile).filter(function(f) {
        return f.filename.toLowerCase().indexOf(kw) !== -1 || f.label.toLowerCase().indexOf(kw) !== -1;
    });
    if (matched.length === 0) {
        gridEl.innerHTML = '<div class="empty"><div class="emoji">&#128269;</div><p>No matching dashboards</p></div>';
    } else {
        gridEl.innerHTML = matched.map(function(f, i) {
            return '<a href="' + f.filename + '" class="card" style="animation:fadeUp .5s ease-out ' + (i*0.04) + 's both">'
                + '<div class="card-number">' + f.num + '</div>'
                + '<div class="card-body"><div class="card-title">' + f.label + '</div>'
                + '<div class="card-meta"><span class="dot"></span><span>' + f.filename + '</span></div></div>'
                + '<svg class="card-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>'
                + '</a>';
        }).join('');
    }
    countEl.innerHTML = '<strong>' + matched.length + '</strong> / ' + files.length + ' dashboards';
}

searchEl.addEventListener('input', function(e) { render(e.target.value); });
document.getElementById('gridBtn').addEventListener('click', function() {
    gridEl.classList.remove('list-view');
    this.classList.add('active');
    document.getElementById('listBtn').classList.remove('active');
});
document.getElementById('listBtn').addEventListener('click', function() {
    gridEl.classList.add('list-view');
    this.classList.add('active');
    document.getElementById('gridBtn').classList.remove('active');
});
render('');
</script>
</body>
</html>
